name: Build pye3d

on:
  pull_request:
  push:
    branches: [master, main]
    tags: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest -> manylinux x86_64, windows-latest -> AMD64,
        # macos-13 -> x86_64, macos-latest -> arm64. cibuildwheel builds
        # natively on each runner (archs = "native" in pyproject.toml).
        os: [ubuntu-latest, windows-latest, macos-13, macos-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # setuptools_scm needs the full history/tags

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build sdist
        run: pipx run build --sdist

      - name: Check metadata
        run: pipx run twine check dist/*.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_docs:
    name: Ensure documentation builds correctly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build docs via tox
        run: pipx run tox -e docs

  benchmark:
    name: Benchmark vs PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    env:
      INPUT_URL: https://github.com/pupil-labs/pye3d-detector/wiki/files/pye3d_test_input.npz
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          # 3.11: PyPI 0.3.2 ships a cp311 wheel and the built artifact is
          # cp311-abi3, so both baseline and candidate install cleanly here.
          python-version: "3.11"

      - name: Download built wheels (linux)
        uses: actions/download-artifact@v8
        with:
          name: cibw-wheels-ubuntu-latest
          path: wheelhouse

      - name: Fetch test input
        run: curl -L "$INPUT_URL" --silent --output input.npz

      - name: Benchmark built wheel
        run: |
          python -m venv .venv-built
          .venv-built/bin/pip install --upgrade pip
          .venv-built/bin/pip install numpy opencv-python-headless scikit-image
          .venv-built/bin/pip install --no-index --no-deps --find-links wheelhouse pye3d
          .venv-built/bin/python bench/ci_bench.py --input input.npz --out built.json

      - name: Benchmark PyPI release
        run: |
          python -m venv .venv-pypi
          .venv-pypi/bin/pip install --upgrade pip
          # PyPI 0.3.2 was built against the numpy 1.x C-API (it cimports numpy),
          # so the baseline must pin numpy<2.
          .venv-pypi/bin/pip install "pye3d==0.3.2" "numpy<2" opencv-python-headless scikit-image
          .venv-pypi/bin/python bench/ci_bench.py --input input.npz --out pypi.json

      - name: Compare (built vs PyPI) -> job summary
        run: python bench/ci_compare.py --built built.json --baseline pypi.json | tee -a "$GITHUB_STEP_SUMMARY"

  check: # gate used for branch protection
    if: always()
    needs: [build_wheels, build_sdist, build_docs]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  publish:
    name: Publish to PyPI
    needs: [check]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pye3d
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
